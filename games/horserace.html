<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏇 경마게임</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/sound.js"></script>
<script src="../js/presence.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(180deg,#1a3a1a 0%,#0d1b0d 100%);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:10px;overflow-x:hidden}
h1{font-size:1.5em;margin-bottom:6px;text-shadow:0 2px 8px rgba(0,0,0,0.5)}
.info{background:rgba(255,255,255,0.08);padding:8px 16px;border-radius:12px;margin-bottom:8px;text-align:center;font-size:0.85em;max-width:600px}
.status{font-size:1em;margin:6px 0;text-align:center}

/* ═══ 모드 선택 ═══ */
.mode-select{max-width:550px;width:100%;margin:10px auto}
.mode-select h3{text-align:center;margin-bottom:10px}
.mode-cards{display:flex;flex-direction:column;gap:8px}
.mode-card{padding:14px;border:3px solid rgba(255,255,255,0.1);border-radius:14px;background:rgba(255,255,255,0.04);cursor:pointer;transition:all 0.2s}
.mode-card:hover{background:rgba(255,255,255,0.08)}
.mode-card.selected{border-color:#f1c40f;background:rgba(241,196,15,0.1)}
.mode-card .mode-header{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.mode-card .mode-icon{font-size:1.6em}
.mode-card .mode-name{font-size:1em;font-weight:bold}
.mode-card .mode-desc{font-size:0.75em;color:rgba(255,255,255,0.5);line-height:1.3}

/* ═══ 레이스 트랙 (리얼 애니메이션) ═══ */
.race-container{
  width:100%;max-width:700px;margin:10px auto;
  background:linear-gradient(180deg,#2d5a1e 0%,#1a3a12 3%,#8B6914 4%,#a07828 50%,#8B6914 96%,#1a3a12 97%,#2d5a1e 100%);
  border-radius:16px;overflow:hidden;position:relative;
  box-shadow:0 4px 30px rgba(0,0,0,0.5),inset 0 0 60px rgba(0,0,0,0.3);
  border:3px solid #3a5a2a;
}
.track-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 12px;background:rgba(0,0,0,0.4);
  font-size:0.8em;border-bottom:2px solid rgba(255,255,255,0.1);
}
.track-header .round-info{color:#f1c40f;font-weight:bold}
.track-header .race-status{color:#2ecc71}

.lane{
  position:relative;height:52px;
  border-bottom:1px dashed rgba(255,255,255,0.08);
  background:linear-gradient(90deg,rgba(0,0,0,0.15) 0%,transparent 5%,transparent 95%,rgba(0,0,0,0.15) 100%);
  overflow:hidden;
}
.lane:nth-child(even){background:linear-gradient(90deg,rgba(0,0,0,0.15) 0%,rgba(255,255,255,0.02) 5%,rgba(255,255,255,0.02) 95%,rgba(0,0,0,0.15) 100%)}

/* 트랙 라인 마커 */
.lane::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(90deg,transparent 0,transparent 9.8%,rgba(255,255,255,0.04) 9.8%,rgba(255,255,255,0.04) 10.2%);
  pointer-events:none;
}

.lane-label{
  position:absolute;left:4px;top:50%;transform:translateY(-50%);
  font-size:0.65em;font-weight:bold;z-index:5;
  background:rgba(0,0,0,0.5);padding:2px 6px;border-radius:6px;
  white-space:nowrap;max-width:70px;overflow:hidden;text-overflow:ellipsis;
}

/* ═══ 말 애니메이션 ═══ */
.horse-wrap{
  position:absolute;top:50%;transform:translateY(-50%);
  transition:left 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
  z-index:10;display:flex;align-items:center;
  filter:drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
}

.horse-body{
  font-size:1.8em;line-height:1;
  animation:gallop 0.3s ease-in-out infinite;
  display:inline-block;
}
.horse-body.stopped{animation:none}
.horse-body.won{animation:horseWin 0.4s ease-in-out infinite}

@keyframes gallop{
  0%{transform:translateY(0) rotate(-2deg) scaleX(1)}
  25%{transform:translateY(-4px) rotate(0deg) scaleX(1.03)}
  50%{transform:translateY(-1px) rotate(2deg) scaleX(0.97)}
  75%{transform:translateY(-5px) rotate(0deg) scaleX(1.02)}
  100%{transform:translateY(0) rotate(-2deg) scaleX(1)}
}

@keyframes horseWin{
  0%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-8px) scale(1.15)}
  100%{transform:translateY(0) scale(1)}
}

/* 먼지 이펙트 */
.dust-trail{
  position:absolute;right:100%;top:55%;width:40px;height:16px;
  pointer-events:none;
}
.dust-particle{
  position:absolute;width:6px;height:6px;border-radius:50%;
  background:rgba(180,150,100,0.5);
  animation:dustFly 0.5s ease-out infinite;
}
.dust-particle:nth-child(1){animation-delay:0s;top:0}
.dust-particle:nth-child(2){animation-delay:0.12s;top:5px;left:8px}
.dust-particle:nth-child(3){animation-delay:0.24s;top:2px;left:16px}
.dust-particle:nth-child(4){animation-delay:0.08s;top:8px;left:4px}
.dust-particle.stopped{animation:none;opacity:0}

@keyframes dustFly{
  0%{transform:translate(0,0) scale(1);opacity:0.6}
  100%{transform:translate(-20px,4px) scale(0.3);opacity:0}
}

/* 결승선 */
.finish-line{
  position:absolute;right:0;top:0;bottom:0;width:12px;z-index:3;
  background:repeating-linear-gradient(180deg,#fff 0,#fff 6px,#000 6px,#000 12px);
  opacity:0.7;
}
.finish-flag{
  position:absolute;right:14px;top:2px;font-size:0.9em;z-index:4;
}

/* 순위 뱃지 */
.rank-badge{
  position:absolute;right:-8px;top:-8px;
  font-size:0.7em;z-index:15;
  background:rgba(0,0,0,0.6);border-radius:50%;
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;
}

/* 실시간 순위 보드 */
.live-rank{
  display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:6px 0;
  max-width:700px;width:100%;
}
.rank-chip{
  padding:3px 10px;border-radius:10px;font-size:0.75em;font-weight:bold;
  display:flex;align-items:center;gap:4px;
  background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);
}
.rank-chip.first{background:rgba(241,196,15,0.25);border-color:#f1c40f}

/* ═══ 게임 UI ═══ */
.bet-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0}
.bet-btn{padding:10px 16px;border:2px solid rgba(255,255,255,0.3);border-radius:10px;background:rgba(255,255,255,0.08);color:#fff;font-size:0.95em;cursor:pointer;transition:all 0.15s}
.bet-btn:hover{background:rgba(255,255,255,0.15)}
.bet-btn.sel{border-color:#f1c40f;background:rgba(241,196,15,0.25)}
.bet-btn.locked{pointer-events:none;opacity:0.7}

.boost-area{text-align:center;margin:10px 0}
.boost-btn{width:160px;height:160px;border-radius:50%;border:4px solid #f39c12;background:rgba(243,156,18,0.15);color:#fff;font-size:1.1em;cursor:pointer;transition:all 0.1s;display:inline-flex;align-items:center;justify-content:center}
.boost-btn:active{transform:scale(0.93);background:rgba(243,156,18,0.35)}

.quiz-box{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.15);border-radius:14px;padding:14px;text-align:center;max-width:500px;width:100%;margin:8px auto}
.quiz-q{font-size:1.1em;font-weight:bold;margin-bottom:10px}
.quiz-opts{display:flex;flex-direction:column;gap:6px}
.quiz-opt{padding:10px;border:2px solid rgba(255,255,255,0.2);border-radius:10px;background:rgba(255,255,255,0.04);color:#fff;font-size:0.95em;cursor:pointer;text-align:left;transition:all 0.15s}
.quiz-opt:hover{background:rgba(255,255,255,0.1)}
.quiz-opt.correct-opt{border-color:#2ecc71;background:rgba(46,204,113,0.2)}
.quiz-opt.wrong-opt{border-color:#e74c3c;background:rgba(231,76,60,0.2)}
.quiz-opt.locked{pointer-events:none}

.result-box{background:rgba(241,196,15,0.12);border:2px solid #f1c40f;border-radius:16px;padding:18px;text-align:center;max-width:600px;width:100%;margin:8px 0}
.scores table{width:100%;border-collapse:collapse;max-width:600px}
.scores th,.scores td{padding:5px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.1)}
.scores th{color:#f1c40f}
.btn{padding:12px 24px;border:none;border-radius:12px;font-size:1em;cursor:pointer;font-weight:bold;margin:5px}
.btn-primary{background:linear-gradient(135deg,#f1c40f,#f39c12);color:#1a1a2e}
.btn-back{background:rgba(255,255,255,0.15);color:#fff}
.end-buttons{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.end-buttons button{padding:12px 24px;border:none;border-radius:12px;font-size:1em;cursor:pointer;font-weight:bold;transition:transform 0.15s}
.end-buttons button:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,0,0,0.3)}
.btn-retry{background:linear-gradient(135deg,#f1c40f,#f39c12);color:#1a1a2e}
.btn-mode{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-lobby2{background:rgba(255,255,255,0.15);color:#fff}
.wait-msg{color:rgba(255,255,255,0.5);font-size:0.85em;animation:wmPulse 1.5s infinite}
@keyframes wmPulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

/* 카운트다운 오버레이 */
.cd-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.8);z-index:100;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
}
.cd-overlay .cd-num{
  font-size:8em;font-weight:900;color:#f1c40f;
  text-shadow:0 0 40px rgba(241,196,15,0.5);
  animation:cdPop 0.5s ease-out;
}
.cd-overlay .cd-text{font-size:1.2em;color:rgba(255,255,255,0.6);margin-top:10px}
@keyframes cdPop{0%{transform:scale(2);opacity:0}60%{transform:scale(0.9)}100%{transform:scale(1);opacity:1}}

/* 스크롤 트랙 잔디 */
.grass-top,.grass-bottom{
  height:8px;
  background:repeating-linear-gradient(90deg,#2d5a1e 0,#3a6a28 10px,#2d5a1e 20px);
}
</style>
</head>
<body data-bgm="race">
<h1>🏇 경마게임</h1>
<div class="info" id="infoText">말에 베팅하고 경주를 지켜보세요!</div>
<div class="status" id="status">⏳ 로딩 중...</div>

<div class="mode-select" id="modeSelect" style="display:none">
  <h3>🎮 경마 모드 선택</h3>
  <div class="mode-cards">
    <div class="mode-card selected" data-mode="classic" onclick="selectMode('classic')"><div class="mode-header"><span class="mode-icon">🎲</span><span class="mode-name">클래식 베팅</span></div><div class="mode-desc">말에 베팅하고 랜덤 경주!</div></div>
    <div class="mode-card" data-mode="boost" onclick="selectMode('boost')"><div class="mode-header"><span class="mode-icon">👆</span><span class="mode-name">터치 부스트</span></div><div class="mode-desc">화면을 빠르게 터치해서 말을 전진!</div></div>
    <div class="mode-card" data-mode="quiz" onclick="selectMode('quiz')"><div class="mode-header"><span class="mode-icon">🧠</span><span class="mode-name">퀴즈 레이스</span></div><div class="mode-desc">퀴즈를 맞추면 내 말이 전진!</div></div>
    <div class="mode-card" data-mode="obstacle" onclick="selectMode('obstacle')"><div class="mode-header"><span class="mode-icon">🪨</span><span class="mode-name">장애물 레이스</span></div><div class="mode-desc">베팅 + 랜덤 이벤트!</div></div>
    <div class="mode-card" data-mode="odds" onclick="selectMode('odds')"><div class="mode-header"><span class="mode-icon">💰</span><span class="mode-name">배당률 베팅</span></div><div class="mode-desc">높은 배당의 말에 걸면 대박!</div></div>
  </div>
  <button class="btn btn-primary" style="width:100%;margin-top:12px;font-size:1.1em;" onclick="hostStart()">🏁 시작!</button>
</div>
<div id="guestWait" style="display:none;text-align:center;margin:20px;color:rgba(255,255,255,0.5)">방장이 모드를 선택하고 있습니다...</div>

<div id="raceContainer" class="race-container" style="display:none"></div>
<div class="live-rank" id="liveRank"></div>
<div id="gameArea" style="display:none"></div>
<div id="resultArea" style="display:none"></div>
<div class="scores" id="scoreArea" style="display:none"><h3 style="text-align:center;margin-bottom:5px">📊 점수</h3><table><thead><tr><th>이름</th><th>점수</th></tr></thead><tbody id="scoreBody"></tbody></table></div>
<div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
  <button class="btn btn-primary" id="btnStart" style="display:none" onclick="startRace()">🏁 경주 시작!</button>
  <button class="btn btn-primary" id="btnNext" style="display:none" onclick="nextRound()">➡️ 다음</button>
  <button class="btn btn-back" id="btnBackMain" onclick="backToLobby()">🔙 로비로</button>
</div>
<div id="cdOverlay" style="display:none"></div>

<div style="position:fixed;bottom:10px;right:10px;background:rgba(0,0,0,0.6);padding:8px 12px;border-radius:10px;font-size:0.8em;color:#fff;z-index:999;">
  🔊 <input type="range" min="0" max="100" value="50" style="width:80px;vertical-align:middle;" oninput="SoundEffects.setMasterVolume(this.value/100)">
  <button onclick="if(SoundEffects.bgmPlaying){if(typeof SoundEffects.stopBGM==='function')SoundEffects.stopBGM();this.textContent='🎵 ON';}else{if(typeof SoundEffects.startBGM==='function')SoundEffects.startBGM('race');this.textContent='🎵 OFF';}" style="background:none;border:1px solid rgba(255,255,255,0.3);color:#fff;padding:3px 8px;border-radius:6px;cursor:pointer;font-size:0.85em;">🎵 ON/OFF</button>
</div>

<script>
const roomCode=Utils.getRoomCode(),playerId=Utils.getPlayerId(),playerName=Utils.getPlayerName();
const gameRef=db.ref(`rooms/${roomCode}/gameData`);
let isHost=false,currentPlayers={},raceTimer=null;

const HORSE_NAMES=['번개','질풍','천둥','폭풍','유성','화살'];
const HORSE_EMOJIS=['🐎','🏇','🐴','🦄','🐎','🏇'];
const HORSE_COLORS=['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22'];
const TOTAL_ROUNDS=3,FINISH=100;
let selectedMode='classic';

// 갤럽 사운드 주기
let gallopSoundTimer=null;

function getName(pid){return(currentPlayers[pid]&&currentPlayers[pid].name)||'익명';}

// ═══ End Buttons ═══
function renderEndButtons(container){
  let html='<div class="end-buttons">';
  if(isHost){
    html+='<button class="btn-retry" onclick="restartGame()">🔄 다시하기</button>';
    html+='<button class="btn-mode" onclick="showModeSelectFromEnd()">🎮 다른 모드 선택</button>';
  }else{
    html+='<p class="wait-msg">방장이 다음 게임을 준비하고 있습니다...</p>';
  }
  html+='<button class="btn-lobby2" onclick="backToLobby()">🏠 로비로</button>';
  html+='</div>';
  container.innerHTML+=html;
}
async function restartGame(){if(!isHost)return;await gameRef.remove();hostStart();}
async function showModeSelectFromEnd(){if(!isHost)return;await gameRef.remove();}

// ═══ 퀴즈 풀 ═══
const QUIZ_POOL=[
  {q:"대한민국의 수도는?",opts:["서울","부산","대구","인천"],ans:0},
  {q:"1+1=?",opts:["1","2","3","11"],ans:1},
  {q:"지구에서 가장 큰 바다는?",opts:["대서양","인도양","태평양","북극해"],ans:2},
  {q:"무지개 색깔은 몇 가지?",opts:["5","6","7","8"],ans:2},
  {q:"물의 화학식은?",opts:["H2O","CO2","NaCl","O2"],ans:0},
  {q:"태양계에서 가장 큰 행성은?",opts:["토성","목성","해왕성","천왕성"],ans:1},
  {q:"세계에서 가장 높은 산은?",opts:["K2","에베레스트","킬리만자로","몽블랑"],ans:1},
  {q:"대한민국 국화는?",opts:["장미","벚꽃","무궁화","해바라기"],ans:2},
  {q:"삼각형 내각의 합은?",opts:["90도","180도","270도","360도"],ans:1},
  {q:"올림픽은 몇 년마다?",opts:["2년","3년","4년","5년"],ans:2},
  {q:"지구의 위성은?",opts:["태양","달","화성","금성"],ans:1},
  {q:"한국 전쟁 발발 연도는?",opts:["1945","1948","1950","1953"],ans:2},
  {q:"세종대왕이 만든 것은?",opts:["거북선","한글","불국사","첨성대"],ans:1},
  {q:"커피 원두의 원산지는?",opts:["브라질","에티오피아","콜롬비아","베트남"],ans:1},
  {q:"인체에서 가장 큰 장기는?",opts:["심장","간","폐","피부"],ans:3}
];

const EVENTS=[
  {text:"💨 순풍! {horse} 부스트!",type:"boost",amount:15},
  {text:"🪨 낙석! {horse} 후퇴!",type:"back",amount:10},
  {text:"🌀 혼란! 전체 셔플!",type:"shuffle",amount:0},
  {text:"⚡ 번개! {horse} 대폭 전진!",type:"boost",amount:25},
  {text:"🕳️ 구덩이! {horse} 감속!",type:"back",amount:5},
  {text:"🔄 역전! 1등↔꼴등!",type:"swap",amount:0},
  {text:"☀️ 맑음! 이벤트 없음~",type:"none",amount:0}
];

function selectMode(mode){selectedMode=mode;document.querySelectorAll('.mode-card').forEach(c=>c.classList.toggle('selected',c.dataset.mode===mode));}

// ═══ 트랙 렌더링 (리얼 애니메이션) ═══
function renderTrack(horses, mode, isRacing){
  const container=document.getElementById('raceContainer');
  container.style.display='';

  const sorted=horses.slice().map((h,i)=>({...h,origIdx:i})).sort((a,b)=>(b.pos||0)-(a.pos||0));
  const rankMap={};sorted.forEach((h,rank)=>{rankMap[h.origIdx]=rank;});

  let html='';
  html+='<div class="track-header">';
  html+='<span class="round-info" id="trackRoundInfo"></span>';
  html+=`<span class="race-status">${isRacing?'🏁 경주 중!':'⏳ 대기'}</span>`;
  html+='</div>';
  html+='<div class="grass-top"></div>';

  horses.forEach((h,i)=>{
    const color=h.color||HORSE_COLORS[i%HORSE_COLORS.length];
    const pct=Math.min(h.pos||0,FINISH);
    const leftPct=Math.max(0, (pct/FINISH)*85 + 5); // 5%~90% 범위
    const rank=rankMap[i];
    const rankIcon=rank===0?'🥇':rank===1?'🥈':rank===2?'🥉':'';
    const finished=pct>=FINISH;
    const emoji=HORSE_EMOJIS[i%HORSE_EMOJIS.length];
    const animClass=finished?'won':isRacing?'':'stopped';
    const oddsText=(mode==='odds'&&h.odds)?` x${h.odds}`:'';
    const displayName=(h.name||HORSE_NAMES[i]).substring(0,4);

    html+=`<div class="lane">`;
    html+=`<div class="lane-label" style="color:${color}">${rankIcon}${displayName}${oddsText}</div>`;

    html+=`<div class="horse-wrap" style="left:${leftPct}%;">`;
    if(isRacing&&!finished){
      html+=`<div class="dust-trail">`;
      html+=`<div class="dust-particle"></div><div class="dust-particle"></div><div class="dust-particle"></div><div class="dust-particle"></div>`;
      html+=`</div>`;
    }
    html+=`<span class="horse-body ${animClass}" style="filter:drop-shadow(0 0 6px ${color})">${emoji}</span>`;
    if(rankIcon)html+=`<div class="rank-badge">${rankIcon}</div>`;
    html+=`</div>`;

    html+=`<div class="finish-line"></div>`;
    if(i===0)html+=`<div class="finish-flag">🏁</div>`;
    html+=`</div>`;
  });

  html+='<div class="grass-bottom"></div>';
  container.innerHTML=html;

  let rankHtml='';
  sorted.forEach((h,rank)=>{
    const color=h.color||HORSE_COLORS[h.origIdx%HORSE_COLORS.length];
    const medal=rank===0?'🥇':rank===1?'🥈':rank===2?'🥉':`${rank+1}`;
    const name=(h.name||HORSE_NAMES[h.origIdx]).substring(0,4);
    rankHtml+=`<div class="rank-chip ${rank===0?'first':''}" style="border-color:${color}40">`;
    rankHtml+=`<span>${medal}</span>`;
    rankHtml+=`<span style="color:${color}">${name}</span>`;
    rankHtml+=`<span style="color:rgba(255,255,255,0.5)">${Math.round(h.pos||0)}m</span>`;
    rankHtml+=`</div>`;
  });
  document.getElementById('liveRank').innerHTML=rankHtml;
}

// ═══ 카운트다운 ═══
function showCountdown(cb){
  const overlay=document.getElementById('cdOverlay');
  overlay.style.display='flex';
  overlay.className='cd-overlay';
  let count=3;
  function tick(){
    if(count>0){
      overlay.innerHTML=`<div class="cd-num">${count}</div><div class="cd-text">경주 시작까지...</div>`;
      if(typeof SoundEffects.play==='function')SoundEffects.play('countdown');
      count--;
      setTimeout(tick,800);
    }else{
      overlay.innerHTML=`<div class="cd-num" style="color:#2ecc71">GO!</div>`;
      if(typeof SoundEffects.play==='function')SoundEffects.play('go');
      setTimeout(()=>{overlay.style.display='none';cb();},600);
    }
  }
  tick();
}

}

// ═══ 호스트 시작 ═══
async function hostStart(){
  if(!isHost)return;
  const pids=Object.keys(currentPlayers);
  const n=Math.min(6,Math.max(3,pids.length+1));

  if(selectedMode==='classic'){
    const horses=[];for(let i=0;i<n;i++)horses.push({name:HORSE_NAMES[i],pos:0,color:HORSE_COLORS[i]});
    await gameRef.set({mode:'classic',round:1,phase:'betting',horses,bets:null,scores:{},winner:-1,roundId:Date.now()});
  }else if(selectedMode==='boost'){
    const horses=[];pids.forEach((pid,i)=>{horses.push({name:getName(pid),pos:0,pid,color:HORSE_COLORS[i%HORSE_COLORS.length]});});
    await gameRef.set({mode:'boost',round:1,phase:'racing',horses,taps:{},scores:{},winner:-1,raceStart:Date.now(),roundId:Date.now()});
  }else if(selectedMode==='quiz'){
    const horses=[];pids.forEach((pid,i)=>{horses.push({name:getName(pid),pos:0,pid,color:HORSE_COLORS[i%HORSE_COLORS.length]});});
    const quizzes=[...QUIZ_POOL].sort(()=>Math.random()-0.5).slice(0,15);
    await gameRef.set({mode:'quiz',round:1,phase:'question',horses,quizzes,qIdx:0,answers:null,scores:{},winner:-1,roundId:Date.now()});
  }else if(selectedMode==='obstacle'){
    const horses=[];for(let i=0;i<n;i++)horses.push({name:HORSE_NAMES[i],pos:0,color:HORSE_COLORS[i]});
    await gameRef.set({mode:'obstacle',round:1,phase:'betting',horses,bets:null,scores:{},winner:-1,event:null,turnNum:0,roundId:Date.now()});
  }else if(selectedMode==='odds'){
    const oddsArr=[1.5,2,3,4,6,10].sort(()=>Math.random()-0.5).slice(0,n);
    const horses=[];for(let i=0;i<n;i++)horses.push({name:HORSE_NAMES[i],pos:0,odds:oddsArr[i],color:HORSE_COLORS[i]});
    await gameRef.set({mode:'odds',round:1,phase:'betting',horses,bets:null,scores:{},winner:-1,roundId:Date.now()});
  }
}

// ═══ init ═══
async function init(){
  const snap=await db.ref(`rooms/${roomCode}/players`).once('value');currentPlayers=snap.val()||{};

// ═══ 메인 렌더 ═══
function render(d){
  if(!d)return;
  document.getElementById('modeSelect').style.display='none';
  document.getElementById('guestWait').style.display='none';
  document.getElementById('gameArea').style.display='';
  const mode=d.mode||'classic';
  const infoMap={classic:'말에 베팅하고 랜덤 경주를 지켜보세요!',boost:'화면을 빠르게 터치해서 내 말을 전진시키세요!',quiz:'퀴즈를 맞추면 내 말이 전진합니다!',obstacle:'매 턴 랜덤 이벤트가 발생하는 경주!',odds:'배당률이 높을수록 느리지만 맞추면 대박!'};
  document.getElementById('infoText').textContent=infoMap[mode]||'';
  if(d.phase==='final'){renderFinal(d);return;}
  const isRacing=(d.phase==='racing');
  renderTrack(d.horses||[],mode,isRacing);
  const ri=document.getElementById('trackRoundInfo');
  if(ri)ri.textContent=`라운드 ${d.round||1}/${TOTAL_ROUNDS}`;

  if(mode==='classic')renderClassic(d);
  else if(mode==='boost')renderBoost(d);
  else if(mode==='quiz')renderQuiz(d);
  else if(mode==='obstacle')renderObstacle(d);
  else if(mode==='odds')renderOdds(d);
}

// ═══ 클래식 ═══
function renderClassic(d){
  const phase=d.phase,round=d.round||1,horses=d.horses||[],bets=d.bets||{};
  if(phase==='betting'){
    const bc=Object.keys(bets).length,tc=Object.keys(currentPlayers).length;
    document.getElementById('status').textContent=`🎲 라운드 ${round}/${TOTAL_ROUNDS} — 베팅 (${bc}/${tc})`;
    const myB=bets[playerId];let html='<h3 style="text-align:center;margin-bottom:8px">🎯 어떤 말에 베팅?</h3><div class="bet-btns">';
    horses.forEach((h,i)=>{let cls='bet-btn';if(myB!==undefined&&Number(myB)===i)cls+=' sel';if(myB!==undefined)cls+=' locked';html+=`<button class="${cls}" onclick="placeBet(${i})" style="border-color:${h.color||HORSE_COLORS[i]}">${HORSE_EMOJIS[i]} ${h.name}</button>`;});
    html+='</div>';document.getElementById('gameArea').innerHTML=html;
    document.getElementById('resultArea').style.display='none';document.getElementById('btnNext').style.display='none';
    document.getElementById('btnStart').style.display=(isHost&&bc>=tc)?'':'none';
  }else if(phase==='racing'){
    document.getElementById('status').textContent=`🏇 라운드 ${round}/${TOTAL_ROUNDS} — 경주 중!`;
    document.getElementById('gameArea').innerHTML='<div style="text-align:center;font-size:1.2em;animation:fadeIn 0.3s">🏇💨 달리는 중...</div>';
    document.getElementById('btnStart').style.display='none';document.getElementById('btnNext').style.display='none';
  }else if(phase==='result'){
    stopGallopSound();
    const w=d.winner;const wName=(w>=0&&horses[w])?horses[w].name:'???';
    document.getElementById('status').textContent=`🏆 라운드 ${round}/${TOTAL_ROUNDS} — 결과!`;
    let html=`<div class="result-box"><h2>🥇 ${wName} 우승!</h2>`;
    Object.keys(currentPlayers).forEach(pid=>{const b=bets[pid];const won=(b!==undefined&&Number(b)===w);html+=`<div style="color:${won?'#2ecc71':'#e74c3c'};margin:3px 0">${won?'✅':'❌'} ${getName(pid)} → ${won?'+10':'0'}</div>`;});
    html+='</div>';document.getElementById('gameArea').innerHTML='';document.getElementById('resultArea').innerHTML=html;document.getElementById('resultArea').style.display='';
    if(isHost){document.getElementById('btnNext').style.display='';document.getElementById('btnNext').textContent=(round>=TOTAL_ROUNDS)?'🏆 최종결과':'➡️ 다음 라운드';}
    document.getElementById('btnStart').style.display='none';
  }
  renderScores(d.scores||{});
}

function placeBet(i){gameRef.child('bets').child(playerId).once('value').then(s=>{if(s.val()!==null)return;if(typeof SoundEffects.play==='function')SoundEffects.play('click');gameRef.child(`bets/${playerId}`).set(i);});}

async function startRace(){
  if(!isHost)return;const snap=await gameRef.once('value');const d=snap.val();if(!d)return;
  const mode=d.mode;
  if(mode==='classic'||mode==='odds'){
    showCountdown(()=>{
      gameRef.update({phase:'racing'});
      startGallopSound();
      runAutoRace(d);
    });
  }else if(mode==='obstacle'){
    showCountdown(()=>{
      gameRef.update({phase:'racing'});
      startGallopSound();
      runObstacleRace(d);
    });
  }
}

function runAutoRace(d){
  const mode=d.mode;
  raceTimer=setInterval(async()=>{
    const snap=await gameRef.once('value');const dd=snap.val();
    if(!dd||dd.phase!=='racing'){clearInterval(raceTimer);raceTimer=null;stopGallopSound();return;}
    const horses=dd.horses||[];let finished=false,winIdx=-1;
    horses.forEach((h,i)=>{if((h.pos||0)<FINISH){let spd=Math.random()*5+2;if(Math.random()<0.08)spd+=Math.random()*18;if(Math.random()<0.05)spd=Math.random()*1.5;if(mode==='odds'&&h.odds){spd=spd*(1.2/h.odds);if(Math.random()<0.08/h.odds*2)spd+=22;}h.pos=(h.pos||0)+spd;if(h.pos>=FINISH&&!finished){h.pos=FINISH;finished=true;winIdx=i;}}});
    if(finished&&winIdx>=0){clearInterval(raceTimer);raceTimer=null;stopGallopSound();const bets=dd.bets||{},scores=dd.scores||{};Object.keys(bets).forEach(pid=>{if(Number(bets[pid])===winIdx){const mult=mode==='odds'?(horses[winIdx].odds||1):1;scores[pid]=(scores[pid]||0)+Math.round(10*mult);}});await gameRef.update({horses,winner:winIdx,scores,phase:'result'});if(typeof SoundEffects.play==='function')SoundEffects.play('fanfare');}
    else{await gameRef.child('horses').set(horses);}
  },250);
}

// ═══ 터치 부스트 ═══
let boostCooldown=false,boostCountdownTimer=null,boostRaceStart=0;const BOOST_TIME=15;

function renderBoost(d){
  const phase=d.phase,round=d.round||1,horses=d.horses||[],taps=d.taps||{};
  if(phase==='racing'){
    boostRaceStart=d.raceStart||Date.now();
    document.getElementById('status').textContent=`👆 라운드 ${round}/${TOTAL_ROUNDS} — 터치!`;
    const myTaps=taps[playerId]||0;
    let html=`<div style="text-align:center;font-size:2em;font-weight:bold;color:#f1c40f;margin:6px 0" id="boostTimer">--</div>`;
    html+=`<div style="text-align:center;font-size:0.85em;color:rgba(255,255,255,0.6)">내 탭: ${myTaps}회</div>`;
    html+=`<div class="boost-area"><button class="boost-btn" onclick="tapBoost()">👆<br>터치!</button></div>`;
    document.getElementById('gameArea').innerHTML=html;
    document.getElementById('resultArea').style.display='none';document.getElementById('btnNext').style.display='none';document.getElementById('btnStart').style.display='none';
    startBoostCountdown();
    if(isHost&&!raceTimer){raceTimer=setInterval(async()=>{const s=await gameRef.once('value');const dd=s.val();if(!dd||dd.phase!=='racing'){clearInterval(raceTimer);raceTimer=null;return;}const el=Math.floor((Date.now()-(dd.raceStart||Date.now()))/1000);if(el>=BOOST_TIME)finishBoostRace(dd);},500);}
  }else if(phase==='result'){
    stopBoostCountdown();const w=d.winner;const wName=(w>=0&&horses[w])?horses[w].name:'???';
    document.getElementById('status').textContent=`🏆 라운드 ${round}/${TOTAL_ROUNDS} — 결과!`;
    let html=`<div class="result-box"><h2>🥇 ${wName} 우승!</h2>`;
    horses.slice().sort((a,b)=>(b.pos||0)-(a.pos||0)).forEach((h,i)=>{const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'▪️';html+=`<div style="margin:2px 0">${medal} ${h.name}: ${Math.round(h.pos||0)}m</div>`;});
    html+='</div>';document.getElementById('gameArea').innerHTML='';document.getElementById('resultArea').innerHTML=html;document.getElementById('resultArea').style.display='';
    if(isHost){document.getElementById('btnNext').style.display='';document.getElementById('btnNext').textContent=(round>=TOTAL_ROUNDS)?'🏆 최종결과':'➡️ 다음 라운드';}
  }
  renderScores(d.scores||{});
}

function startBoostCountdown(){stopBoostCountdown();updateBoostDisplay();boostCountdownTimer=setInterval(updateBoostDisplay,100);}
function updateBoostDisplay(){const el=document.getElementById('boostTimer');if(!el)return;const remain=Math.max(0,BOOST_TIME-(Date.now()-boostRaceStart)/1000);el.textContent=remain.toFixed(1)+'초';el.style.color=remain<=3?'#e74c3c':remain<=7?'#f39c12':'#f1c40f';if(remain<=0){el.textContent='⏰ 종료!';stopBoostCountdown();}}
function stopBoostCountdown(){if(boostCountdownTimer){clearInterval(boostCountdownTimer);boostCountdownTimer=null;}}

async function tapBoost(){if(boostCooldown)return;boostCooldown=true;if(typeof SoundEffects.play==='function')SoundEffects.play('click');const snap=await gameRef.once('value');const d=snap.val();if(!d||d.phase!=='racing'){boostCooldown=false;return;}const newTaps=((d.taps&&d.taps[playerId])||0)+1;await gameRef.child(`taps/${playerId}`).set(newTaps);const horses=d.horses||[];const myIdx=horses.findIndex(h=>h.pid===playerId);if(myIdx>=0)await gameRef.child(`horses/${myIdx}/pos`).set(Math.min(FINISH,newTaps*3));setTimeout(()=>{boostCooldown=false;},80);}

async function finishBoostRace(d){if(raceTimer){clearInterval(raceTimer);raceTimer=null;}const horses=d.horses||[];const taps=d.taps||{};const scores=d.scores||{};let maxPos=-1,winIdx=-1;horses.forEach((h,i)=>{const t=taps[h.pid]||0;h.pos=Math.min(FINISH,t*3+Math.random()*5);if(h.pos>maxPos){maxPos=h.pos;winIdx=i;}});if(winIdx>=0&&horses[winIdx]){horses[winIdx].pos=FINISH;const wp=horses[winIdx].pid;if(wp)scores[wp]=(scores[wp]||0)+15;horses.forEach((h,i)=>{if(i!==winIdx&&h.pid)scores[h.pid]=(scores[h.pid]||0)+5;});}await gameRef.update({horses,winner:winIdx,scores,phase:'result'});if(typeof SoundEffects.play==='function')SoundEffects.play('fanfare');}

// ═══ 퀴즈 ═══
let quizAnswered=false,lastQuizRound=0;

function renderQuiz(d){
  const phase=d.phase,round=d.round||1,horses=d.horses||[],qIdx=d.qIdx||0,quizzes=d.quizzes||[],answers=d.answers||{};
  if(phase==='question'){
    if(qIdx>=quizzes.length){if(isHost)gameRef.update({phase:'result',winner:findLeader(horses)});return;}
    const q=quizzes[qIdx];if(!q)return;
    document.getElementById('status').textContent=`🧠 퀴즈 ${qIdx+1}`;
    if(d.roundId!==lastQuizRound){lastQuizRound=d.roundId;quizAnswered=false;}
    if(answers[playerId]!==undefined)quizAnswered=true;
    const myA=answers[playerId];
    let html=`<div class="quiz-box"><div class="quiz-q">${q.q}</div><div class="quiz-opts">`;
    q.opts.forEach((opt,i)=>{let cls='quiz-opt';if(myA!==undefined&&myA===i)cls+=' '+(i===q.ans?'correct-opt':'wrong-opt');if(myA!==undefined)cls+=' locked';html+=`<div class="${cls}" onclick="answerQuiz(${i})">${opt}</div>`;});
    html+=`</div></div>`;
    const ac=Object.keys(answers).length,tc=Object.keys(currentPlayers).length;
    html+=`<div style="text-align:center;font-size:0.8em;color:rgba(255,255,255,0.4)">답변: ${ac}/${tc}</div>`;
    document.getElementById('gameArea').innerHTML=html;document.getElementById('resultArea').style.display='none';document.getElementById('btnStart').style.display='none';
    if(isHost&&ac>=tc){document.getElementById('btnNext').style.display='';document.getElementById('btnNext').textContent='👁️ 다음 문제';}else{document.getElementById('btnNext').style.display='none';}
    if(horses.find(h=>(h.pos||0)>=FINISH)&&isHost)gameRef.update({phase:'result',winner:horses.indexOf(horses.find(h=>(h.pos||0)>=FINISH))});
  }else if(phase==='result'){
    const w=d.winner;const wName=(w>=0&&horses[w])?horses[w].name:'???';
    document.getElementById('status').textContent=`🏆 라운드 ${round}/${TOTAL_ROUNDS} — 결과!`;
    let html=`<div class="result-box"><h2>🥇 ${wName} 우승!</h2>`;
    horses.slice().sort((a,b)=>(b.pos||0)-(a.pos||0)).forEach((h,i)=>{const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'▪️';html+=`<div>${medal} ${h.name}: ${Math.round(h.pos||0)}m</div>`;});
    html+='</div>';document.getElementById('gameArea').innerHTML='';document.getElementById('resultArea').innerHTML=html;document.getElementById('resultArea').style.display='';
    if(isHost){document.getElementById('btnNext').style.display='';document.getElementById('btnNext').textContent=(round>=TOTAL_ROUNDS)?'🏆 최종결과':'➡️ 다음 라운드';}
  }
  renderScores(d.scores||{});
}

async function answerQuiz(i){if(quizAnswered)return;const snap=await gameRef.once('value');const d=snap.val();if(!d||d.phase!=='question')return;if((d.answers||{})[playerId]!==undefined)return;quizAnswered=true;const q=(d.quizzes||[])[d.qIdx||0];if(typeof SoundEffects.play==='function')SoundEffects.play(q&&i===q.ans?'correct':'wrong');await gameRef.child(`answers/${playerId}`).set(i);}
function findLeader(horses){let m=-1,idx=-1;horses.forEach((h,i)=>{if((h.pos||0)>m){m=h.pos||0;idx=i;}});return idx;}

// ═══ 장애물 ═══
function renderObstacle(d){

  }

async function runObstacleRace(d){
  let turnNum=0;
  raceTimer=setInterval(async()=>{
    const snap=await gameRef.once('value');const dd=snap.val();if(!dd||dd.phase!=='racing'){clearInterval(raceTimer);raceTimer=null;stopGallopSound();return;}
    const horses=dd.horses||[];let finished=false,winIdx=-1;turnNum++;
    horses.forEach(h=>{if((h.pos||0)<FINISH){let spd=Math.random()*5+2;if(Math.random()<0.1)spd+=Math.random()*12;h.pos=(h.pos||0)+spd;}});
    let eventText=null;
    if(turnNum%3===0){const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];const ri=Math.floor(Math.random()*horses.length);eventText=ev.text.replace('{horse}',horses[ri].name);if(ev.type==='boost')horses[ri].pos=Math.min(FINISH,(horses[ri].pos||0)+ev.amount);else if(ev.type==='back')horses[ri].pos=Math.max(0,(horses[ri].pos||0)-ev.amount);else if(ev.type==='shuffle'){const ps=horses.map(h=>h.pos||0).sort(()=>Math.random()-0.5);horses.forEach((h,i)=>{h.pos=ps[i];});}else if(ev.type==='swap'){const s=[...horses].sort((a,b)=>(b.pos||0)-(a.pos||0));if(s.length>=2){const t=s[0].pos;s[0].pos=s[s.length-1].pos;s[s.length-1].pos=t;}}}
    horses.forEach((h,i)=>{if((h.pos||0)>=FINISH&&!finished){h.pos=FINISH;finished=true;winIdx=i;}});
    if(finished&&winIdx>=0){clearInterval(raceTimer);raceTimer=null;stopGallopSound();const bets=dd.bets||{},scores=dd.scores||{};Object.keys(bets).forEach(pid=>{if(Number(bets[pid])===winIdx)scores[pid]=(scores[pid]||0)+10;});await gameRef.update({horses,winner:winIdx,scores,phase:'result',event:eventText||'🏁 결승!',turnNum});if(typeof SoundEffects.play==='function')SoundEffects.play('fanfare');}
    else{const u={horses,turnNum};if(eventText)u.event=eventText;await gameRef.update(u);}
  },350);
}

// ═══ 배당률 ═══
function renderOdds(d){
  const phase=d.phase,round=d.round||1,horses=d.horses||[],bets=d.bets||{};
  if(phase==='betting'){
    const bc=Object.keys(bets).length,tc=Object.keys(currentPlayers).length;
    document.getElementById('status').textContent=`💰 배당 베팅 (${bc}/${tc})`;
    const myB=bets[playerId];let html='<h3 style="text-align:center;margin-bottom:8px">💰 배당률을 보고 베팅!</h3><div class="bet-btns">';
    horses.forEach((h,i)=>{let cls='bet-btn';if(myB!==undefined&&Number(myB)===i)cls+=' sel';if(myB!==undefined)cls+=' locked';html+=`<button class="${cls}" onclick="placeBet(${i})" style="border-color:${h.color||HORSE_COLORS[i]}">${HORSE_EMOJIS[i]} ${h.name} <b>(x${h.odds})</b></button>`;});
    html+='</div>';document.getElementById('gameArea').innerHTML=html;document.getElementById('resultArea').style.display='none';document.getElementById('btnNext').style.display='none';
    document.getElementById('btnStart').style.display=(isHost&&bc>=tc)?'':'none';
  }else if(phase==='racing'){
    document.getElementById('status').textContent=`💰 경주 중!`;
    document.getElementById('gameArea').innerHTML='<div style="text-align:center;font-size:1.2em">🏇💨 달리는 중...</div>';
    document.getElementById('btnStart').style.display='none';document.getElementById('btnNext').style.display='none';
  }else if(phase==='result'){
    stopGallopSound();
    const w=d.winner;const wh=(w>=0&&horses[w])?horses[w]:null;
    document.getElementById('status').textContent=`🏆 라운드 ${round}/${TOTAL_ROUNDS}`;
    let html=`<div class="result-box"><h2>🥇 ${wh?wh.name:'???'} (x${wh?wh.odds:'?'})</h2>`;
    Object.keys(currentPlayers).forEach(pid=>{const b=bets[pid];const won=(b!==undefined&&Number(b)===w);const pts=won?Math.round(10*(wh?wh.odds:1)):0;html+=`<div style="color:${won?'#2ecc71':'#e74c3c'}">${won?'✅':'❌'} ${getName(pid)} → ${won?`+${pts}`:'0'}</div>`;});
    html+='</div>';document.getElementById('gameArea').innerHTML='';document.getElementById('resultArea').innerHTML=html;document.getElementById('resultArea').style.display='';
    if(isHost){document.getElementById('btnNext').style.display='';document.getElementById('btnNext').textContent=(round>=TOTAL_ROUNDS)?'🏆 최종결과':'➡️ 다음 라운드';}
  }
  renderScores(d.scores||{});
}

// ═══ 점수 ═══
function renderScores(scores){if(!Object.keys(scores).length){document.getElementById('scoreArea').style.display='none';return;}document.getElementById('scoreArea').style.display='';let html='';Object.keys(currentPlayers).forEach(pid=>{html+=`<tr><td>${getName(pid)}</td><td>${scores[pid]||0}</td></tr>`;});document.getElementById('scoreBody').innerHTML=html;}

// ═══ 다음 라운드 ═══
async function nextRound(){
  if(!isHost)return;const snap=await gameRef.once('value');const d=snap.val();if(!d)return;
  const mode=d.mode,round=d.round||1;

  if(mode==='quiz'&&d.phase==='question'){
    const qIdx=d.qIdx||0;const quizzes=d.quizzes||[];const answers=d.answers||{};const horses=d.horses||[];
    const q=quizzes[qIdx];if(q){Object.keys(answers).forEach(pid=>{const h=horses.find(hh=>hh.pid===pid);if(h&&answers[pid]===q.ans)h.pos=(h.pos||0)+20;});}
    const leader=horses.find(h=>(h.pos||0)>=FINISH);
    if(leader){const wi=horses.indexOf(leader);const scores=d.scores||{};if(leader.pid)scores[leader.pid]=(scores[leader.pid]||0)+15;horses.forEach(h=>{if(h.pid&&h.pid!==leader.pid)scores[h.pid]=(scores[h.pid]||0)+5;});await gameRef.update({horses,winner:wi,scores,phase:'result'});if(typeof SoundEffects.play==='function')SoundEffects.play('fanfare');}
    else if(qIdx+1>=quizzes.length){const wi=findLeader(horses);const scores=d.scores||{};if(wi>=0&&horses[wi].pid)scores[horses[wi].pid]=(scores[horses[wi].pid]||0)+15;await gameRef.update({horses,winner:wi,scores,phase:'result'});if(typeof SoundEffects.play==='function')SoundEffects.play('fanfare');}
    else{await gameRef.update({horses,qIdx:qIdx+1,answers:null,roundId:Date.now()});}
    return;
  }

  if(round>=TOTAL_ROUNDS){await gameRef.update({phase:'final'});return;}
  const pids=Object.keys(currentPlayers);const n=Math.min(6,Math.max(3,pids.length+1));

  if(mode==='classic'){const horses=[];for(let i=0;i<n;i++)horses.push({name:HORSE_NAMES[i],pos:0,color:HORSE_COLORS[i]});await gameRef.update({round:round+1,phase:'betting',horses,bets:null,winner:-1,roundId:Date.now()});}
  else if(mode==='boost'){const horses=[];pids.forEach((pid,i)=>{horses.push({name:getName(pid),pos:0,pid,color:HORSE_COLORS[i%HORSE_COLORS.length]});});await gameRef.update({round:round+1,phase:'racing',horses,taps:{},winner:-1,raceStart:Date.now(),roundId:Date.now()});}
  else if(mode==='quiz'){const horses=[];pids.forEach((pid,i)=>{horses.push({name:getName(pid),pos:0,pid,color:HORSE_COLORS[i%HORSE_COLORS.length]});});const quizzes=[...QUIZ_POOL].sort(()=>Math.random()-0.5).slice(0,15);await gameRef.update({round:round+1,phase:'question',horses,quizzes,qIdx:0,answers:null,winner:-1,roundId:Date.now()});}
  else if(mode==='obstacle'){const horses=[];for(let i=0;i<n;i++)horses.push({name:HORSE_NAMES[i],pos:0,color:HORSE_COLORS[i]});await gameRef.update({round:round+1,phase:'betting',horses,bets:null,winner:-1,event:null,turnNum:0,roundId:Date.now()});}
  else if(mode==='odds'){const oddsArr=[1.5,2,3,4,6,10].sort(()=>Math.random()-0.5).slice(0,n);const horses=[];for(let i=0;i<n;i++)horses.push({name:HORSE_NAMES[i],pos:0,odds:oddsArr[i],color:HORSE_COLORS[i]});await gameRef.update({round:round+1,phase:'betting',horses,bets:null,winner:-1,roundId:Date.now()});}
}

// ═══ 최종 결과 ═══
function renderFinal(d){
  if(raceTimer){clearInterval(raceTimer);raceTimer=null;}
  stopGallopSound();stopBoostCountdown();
  Presence.setGameEnded();
  const scores=d.scores||{};
  const modeNames={classic:'🎲 클래식',boost:'👆 터치 부스트',quiz:'🧠 퀴즈 레이스',obstacle:'🪨 장애물 레이스',odds:'💰 배당률 베팅'};
  document.getElementById('status').textContent='🎉 게임 종료!';
  document.getElementById('raceContainer').style.display='none';document.getElementById('liveRank').innerHTML='';
  document.getElementById('gameArea').innerHTML='';
  document.getElementById('btnStart').style.display='none';document.getElementById('btnNext').style.display='none';
  document.getElementById('btnBackMain').style.display='none';
  const sorted=Object.keys(currentPlayers).map(p=>({name:getName(p),score:scores[p]||0})).sort((a,b)=>b.score-a.score);
  let html=`<div class="result-box"><h2>🏆 최종 결과</h2><div style="font-size:0.85em;color:rgba(255,255,255,0.5);margin-bottom:8px">${modeNames[d.mode]||''}</div>`;
  sorted.forEach((p,i)=>{const m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'▪️';html+=`<div style="font-size:1.1em;margin:4px 0">${m} ${p.name}: ${p.score}점</div>`;});
  html+='</div><div id="endBtns"></div>';
  document.getElementById('resultArea').innerHTML=html;document.getElementById('resultArea').style.display='';
  renderEndButtons(document.getElementById('endBtns'));
  if(typeof SoundEffects.play==='function')SoundEffects.play('fanfare');
}

// ═══ 뒤로가기 ═══
async function backToLobby(){
  if(typeof SoundEffects.stopBGM==='function')SoundEffects.stopBGM();
  if(raceTimer){clearInterval(raceTimer);raceTimer=null;}
  stopGallopSound();stopBoostCountdown();
  Presence.setBackToLobby();
  Presence.destroy();gameRef.off();
  const rc=Utils.getRoomCode();if(rc){await db.ref(`rooms/${rc}/currentGame`).remove();await db.ref(`rooms/${rc}/gameData`).remove();}
  sessionStorage.setItem('returnToLobby','true');window.location.href='../index.html';
}

init();
if(typeof SoundEffects.startBGM==='function')SoundEffects.startBGM('race');
</script>
