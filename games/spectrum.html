<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌈 스펙트럼</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/sound.js"></script>
<script src="../js/presence.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:1.6em;margin-bottom:8px}
.info{background:rgba(255,255,255,0.1);padding:10px 20px;border-radius:12px;margin-bottom:12px;text-align:center;font-size:0.9em;max-width:600px}
.status{font-size:1.1em;margin:10px 0;text-align:center}
.q-text{font-size:1.3em;text-align:center;margin:15px 0;font-weight:bold}
.spec-wrap{max-width:500px;width:100%;margin:15px auto}
.spec-labels{display:flex;justify-content:space-between;font-size:0.85em;color:rgba(255,255,255,0.7);margin-bottom:5px}
.spec-bar{position:relative;width:100%;height:50px;background:linear-gradient(90deg,#3498db,#e74c3c);border-radius:25px;cursor:pointer}
.spec-bar.locked{opacity:0.6;cursor:not-allowed;pointer-events:none}
.my-mk{position:absolute;top:-5px;width:26px;height:60px;background:rgba(255,255,255,0.9);border-radius:6px;transform:translateX(-13px);display:flex;align-items:center;justify-content:center;font-size:0.65em;color:#333;font-weight:bold;pointer-events:none;z-index:5}
.ans-mk{position:absolute;top:-10px;width:4px;height:70px;background:#f1c40f;border-radius:2px;transform:translateX(-2px);pointer-events:none;z-index:10}
.ans-tag{position:absolute;top:-28px;font-size:0.7em;color:#f1c40f;transform:translateX(-20px);white-space:nowrap;z-index:10}
.dot-row{position:relative;width:100%;height:20px;margin-top:5px}
.p-dot{position:absolute;width:14px;height:14px;border-radius:50%;border:2px solid #fff;transform:translateX(-7px);top:3px}
.my-val{text-align:center;margin-top:8px;font-size:0.9em;color:rgba(255,255,255,0.6)}
.result-box{background:rgba(102,126,234,0.12);border:2px solid #667eea;border-radius:16px;padding:20px;text-align:center;max-width:500px;width:100%;margin:10px 0}
.btn{padding:12px 24px;border:none;border-radius:12px;font-size:1em;cursor:pointer;font-weight:bold;margin:5px}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-back{background:rgba(255,255,255,0.15);color:#fff}
.end-buttons{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:15px}
.end-buttons button{padding:12px 24px;border:none;border-radius:12px;font-size:1em;cursor:pointer;font-weight:bold}
.end-buttons button:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,0,0,0.3)}
.btn-retry{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-lobby2{background:rgba(255,255,255,0.15);color:#fff}
.wait-msg{color:rgba(255,255,255,0.5);font-size:0.9em}
</style>
</head>
<body data-bgm="chill">
<h1>🌈 스펙트럼</h1>
<div class="info">질문에 대해 0~100 사이 스펙트럼에서 위치를 선택하세요!</div>
<div class="status" id="status">⏳ 로딩 중...</div>
<div class="q-text" id="qText"></div>
<div class="spec-wrap" id="specWrap">
  <div class="spec-labels"><span id="lL">왼쪽</span><span id="lR">오른쪽</span></div>
  <div class="spec-bar" id="bar"><div class="my-mk" id="myMk" style="display:none"></div><div class="ans-mk" id="ansMk" style="display:none"></div><div class="ans-tag" id="ansTag" style="display:none"></div></div>
  <div class="dot-row" id="dotRow"></div>
  <div class="my-val" id="myVal"></div>
</div>
<div id="resultArea" style="display:none"></div>
<div style="margin-top:15px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
  <button class="btn btn-primary" id="btnConfirm" style="display:none" onclick="confirmPick()">✅ 확정!</button>
  <button class="btn btn-primary" id="btnReveal" style="display:none" onclick="reveal()">👁️ 정답 공개</button>
  <button class="btn btn-primary" id="btnNext" style="display:none" onclick="nextQ()">➡️ 다음</button>
  <button class="btn btn-back" id="btnBackMain" onclick="backToLobby()">🔙 로비로 돌아가기</button>
</div>
<div style="position:fixed;bottom:10px;right:10px;background:rgba(0,0,0,0.6);padding:8px 12px;border-radius:10px;font-size:0.8em;color:#fff;z-index:999;">
  🔊 <input type="range" min="0" max="100" value="50" style="width:80px;vertical-align:middle;" oninput="SoundEffects.setMasterVolume(this.value/100)">
  <button onclick="if(SoundEffects.bgmPlaying){if(typeof SoundEffects.stopBGM==='function')SoundEffects.stopBGM();this.textContent='🎵 ON';}else{if(typeof SoundEffects.startBGM==='function')SoundEffects.startBGM(document.body.dataset.bgm||'chill');this.textContent='🎵 OFF';}" style="background:none;border:1px solid rgba(255,255,255,0.3);color:#fff;padding:3px 8px;border-radius:6px;cursor:pointer;font-size:0.85em;">🎵 ON/OFF</button>
</div>
<script>
const roomCode=Utils.getRoomCode(),playerId=Utils.getPlayerId(),playerName=Utils.getPlayerName();
const gameRef=db.ref(`rooms/${roomCode}/gameData`);
let isHost=false,currentPlayers={},myValue=null,confirmed=false,lastRoundId=0;
const TOTAL_ROUNDS=5;
const QS=[
  {q:"짜장면 vs 짬뽕",left:"짜장면 100%",right:"짬뽕 100%"},
  {q:"아침형 인간인가요?",left:"완전 올빼미",right:"완전 아침형"},
  {q:"혼자 여행 vs 단체 여행",left:"혼자 최고",right:"단체 최고"},
  {q:"매운 음식 잘 먹나요?",left:"전혀 못 먹음",right:"청양고추 OK"},
  {q:"노래방 마이크 잡는 스타일?",left:"절대 안 잡음",right:"놓지 않음"},
  {q:"주말에 집 vs 밖",left:"집이 최고",right:"무조건 밖"},
  {q:"소주 vs 맥주",left:"소주파",right:"맥주파"},
  {q:"고양이 vs 강아지",left:"고양이!",right:"강아지!"},
  {q:"여름 vs 겨울",left:"여름 좋아",right:"겨울 좋아"},
  {q:"현실적 vs 이상적?",left:"완전 현실주의",right:"완전 이상주의"}
];

function getName(pid){return(currentPlayers[pid]&&currentPlayers[pid].name)||'익명';}

function renderEndButtons(container){
  let html='<div class="end-buttons">';
  if(isHost){
    html+='<button class="btn-retry" onclick="restartGame()">🔄 다시하기</button>';
    html+='<button class="btn-lobby2" onclick="goToGameSelect()">🎮 다른 게임 선택</button>';
  }else{
    html+='<p class="wait-msg">방장이 다음 게임을 준비하고 있습니다...</p>';
  }
  html+='<button class="btn-lobby2" onclick="backToLobby()">🏠 로비로</button>';
  html+='</div>';
  container.innerHTML=html;
}

async function restartGame(){if(!isHost)return;await gameRef.remove();initGame();}

async function goToGameSelect(){
  if(!isHost)return;
  if(typeof SoundEffects.stopBGM==='function')SoundEffects.stopBGM();
  Presence.destroy();gameRef.off();
  await db.ref(`rooms/${roomCode}/currentGame`).remove();await db.ref(`rooms/${roomCode}/gameData`).remove();
  sessionStorage.setItem('returnToLobby','true');window.location.href='../index.html';
}

async function init(){
  const snap=await db.ref(`rooms/${roomCode}/players`).once('value');
  currentPlayers=snap.val()||{};
  const hs=await db.ref(`rooms/${roomCode}/host`).once('value');
  isHost=(hs.val()===playerId);
  Presence.init({roomCode,playerId,playerName,onAutoSkip:null});
  const bar=document.getElementById('bar');
  bar.addEventListener('click',e=>{if(confirmed)return;const r=e.currentTarget.getBoundingClientRect();setVal(Math.round(((e.clientX-r.left)/r.width)*100));});
  bar.addEventListener('touchstart',e=>{if(confirmed)return;e.preventDefault();const t=e.touches[0];const r=e.currentTarget.getBoundingClientRect();setVal(Math.round(((t.clientX-r.left)/r.width)*100));},{passive:false});
  gameRef.on('value',s=>{const d=s.val();if(!d){if(isHost)initGame();return;}render(d);});
}

function initGame(){
  const qs=[...QS].sort(()=>Math.random()-0.5).slice(0,TOTAL_ROUNDS);
  qs.forEach(q=>{q.answer=Math.floor(Math.random()*60)+20;});
  gameRef.set({round:1,phase:'choosing',questions:qs,choices:null,scores:{},roundId:Date.now()});
}

function setVal(v){
  myValue=Math.max(0,Math.min(100,v));SoundEffects.play('click');
  const m=document.getElementById('myMk');m.style.display='';m.style.left=myValue+'%';m.textContent=myValue;
  document.getElementById('myVal').textContent='내 선택: '+myValue;
  document.getElementById('btnConfirm').style.display='';
}

function confirmPick(){
  if(myValue===null)return;confirmed=true;SoundEffects.play('correct');
  gameRef.child(`choices/${playerId}`).set(myValue);
  document.getElementById('btnConfirm').style.display='none';
  document.getElementById('bar').classList.add('locked');
  document.getElementById('myVal').textContent='✅ '+myValue+'에 확정!';
}

function render(d){
  if(!d)return;
  const phase=d.phase||'choosing',round=d.round||1,qs=d.questions||[],choices=d.choices||{},scores=d.scores||{};
  if(phase==='final'){renderFinal(scores);return;}
  if(round<1||round>qs.length)return;
  const q=qs[round-1];if(!q)return;

  if(d.roundId && d.roundId!==lastRoundId){
    lastRoundId=d.roundId;
    if(choices[playerId]===undefined){
      confirmed=false;myValue=null;
      document.getElementById('myMk').style.display='none';
      document.getElementById('myVal').textContent='';
      document.getElementById('bar').classList.remove('locked');
    }
  }

  document.getElementById('qText').textContent=`Q${round}. ${q.q}`;
  document.getElementById('lL').textContent=q.left;
  document.getElementById('lR').textContent=q.right;

  if(choices[playerId]!==undefined){
    confirmed=true;myValue=choices[playerId];
    const m=document.getElementById('myMk');m.style.display='';m.style.left=myValue+'%';m.textContent=myValue;
    document.getElementById('myVal').textContent='✅ '+myValue+'에 확정!';
    document.getElementById('bar').classList.add('locked');
  }

  const statusEl=document.getElementById('status');
  if(phase==='choosing'){
    const cc=Object.keys(choices).length,tc=Object.keys(currentPlayers).length;
    statusEl.textContent=`🤔 라운드 ${round}/${TOTAL_ROUNDS} — 선택 중 (${cc}/${tc})`;
    document.getElementById('btnConfirm').style.display=(myValue!==null&&!confirmed)?'':'none';
    document.getElementById('btnReveal').style.display=(isHost&&cc>=tc)?'':'none';
    document.getElementById('btnNext').style.display='none';
    document.getElementById('ansMk').style.display='none';document.getElementById('ansTag').style.display='none';
    document.getElementById('dotRow').innerHTML='';document.getElementById('resultArea').style.display='none';
  }else if(phase==='reveal'){
    statusEl.textContent=`👁️ 라운드 ${round}/${TOTAL_ROUNDS} — 결과!`;
    confirmed=true;document.getElementById('bar').classList.add('locked');
    document.getElementById('btnConfirm').style.display='none';document.getElementById('btnReveal').style.display='none';
    const ans=q.answer;
    document.getElementById('ansMk').style.display='';document.getElementById('ansMk').style.left=ans+'%';
    document.getElementById('ansTag').style.display='';document.getElementById('ansTag').style.left=ans+'%';document.getElementById('ansTag').textContent='정답:'+ans;
    let dots='';Object.keys(currentPlayers).forEach((pid,i)=>{if(choices[pid]!==undefined)dots+=`<div class="p-dot" style="left:${choices[pid]}%;background:${Utils.getColor(i)}" title="${getName(pid)}:${choices[pid]}"></div>`;});
    document.getElementById('dotRow').innerHTML=dots;
    const results=Object.keys(currentPlayers).map(pid=>{const c=choices[pid];const diff=(c!==undefined)?Math.abs(c-ans):100;const pts=Math.max(0,10-Math.floor(diff/10));return{name:getName(pid),choice:c,diff,pts};}).sort((a,b)=>a.diff-b.diff);
    let rHtml='<div class="result-box"><h3>📊 이번 라운드</h3>';
    results.forEach(r=>{const icon=r.pts>=8?'🎯':r.pts>=5?'👍':'😅';rHtml+=`<div style="margin:3px 0">${icon} ${r.name}: ${r.choice!==undefined?r.choice:'-'} (차이:${r.diff}, +${r.pts}점)</div>`;});
    rHtml+='</div>';document.getElementById('resultArea').innerHTML=rHtml;document.getElementById('resultArea').style.display='';
    if(isHost){document.getElementById('btnNext').style.display='';document.getElementById('btnNext').textContent=(round>=TOTAL_ROUNDS)?'🏆 최종결과':'➡️ 다음';}
    else document.getElementById('btnNext').style.display='none';
  }
}

async function reveal(){
  if(!isHost)return;SoundEffects.play('correct');
  const snap=await gameRef.once('value');const d=snap.val();if(!d)return;
  const round=d.round||1,qs=d.questions||[],choices=d.choices||{},scores=d.scores||{};
  const q=qs[round-1];if(!q)return;
  Object.keys(choices).forEach(pid=>{const diff=Math.abs(choices[pid]-q.answer);scores[pid]=(scores[pid]||0)+Math.max(0,10-Math.floor(diff/10));});
  await gameRef.update({phase:'reveal',scores});
}

async function nextQ(){
  if(!isHost)return;const snap=await gameRef.once('value');const d=snap.val();if(!d)return;
  const round=d.round||1;
  if(round>=TOTAL_ROUNDS){await gameRef.update({phase:'final'});return;}
  await gameRef.update({round:round+1,phase:'choosing',choices:null,roundId:Date.now()});
}

function renderFinal(scores){
  Presence.setGameEnded();
  document.getElementById('status').textContent='🎉 게임 종료!';
  document.getElementById('qText').textContent='';document.getElementById('specWrap').style.display='none';
  document.getElementById('btnConfirm').style.display='none';document.getElementById('btnReveal').style.display='none';document.getElementById('btnNext').style.display='none';
  document.getElementById('btnBackMain').style.display='none';
  const sorted=Object.keys(currentPlayers).map(p=>({name:getName(p),score:scores[p]||0})).sort((a,b)=>b.score-a.score);
  let html='<div class="result-box"><h2>🏆 최종 결과!</h2>';
  sorted.forEach((p,i)=>{const m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'▪️';html+=`<div style="font-size:1.1em;margin:4px 0">${m} ${p.name}: ${p.score}점</div>`;});
  html+='</div><div id="endBtns"></div>';
  document.getElementById('resultArea').innerHTML=html;document.getElementById('resultArea').style.display='';
  renderEndButtons(document.getElementById('endBtns'));
  SoundEffects.play('fanfare');
}

async function backToLobby(){if(typeof SoundEffects.stopBGM==='function')SoundEffects.stopBGM();Presence.setBackToLobby();Presence.destroy();gameRef.off();const rc=Utils.getRoomCode();if(rc){await db.ref(`rooms/${rc}/currentGame`).remove();await db.ref(`rooms/${rc}/gameData`).remove();}sessionStorage.setItem('returnToLobby','true');window.location.href='../index.html';}
init();
if(typeof SoundEffects.startBGM==='function')SoundEffects.startBGM('chill');
</script>
</body>
</html>
