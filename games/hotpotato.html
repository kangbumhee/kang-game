<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 폭탄 돌리기</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/sound.js"></script>
<script src="../js/presence.js"></script>
<link rel="stylesheet" href="../css/style.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:1.6em;margin-bottom:8px}
.info{background:rgba(255,255,255,0.1);padding:10px 20px;border-radius:12px;margin-bottom:12px;text-align:center;font-size:0.9em;max-width:500px}
.status{font-size:1.1em;margin:10px 0;text-align:center}
.bomb-area{text-align:center;margin:20px 0}
.bomb{font-size:5em;animation:shake 0.3s infinite}
.bomb.exploded{animation:none;font-size:6em}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
.holder-name{font-size:1.5em;font-weight:bold;margin:10px 0;color:#f39c12;text-align:center}
.mission-box{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.2);border-radius:14px;padding:15px;text-align:center;max-width:400px;width:100%;margin:10px auto}
.pass-btn{padding:16px 40px;border:none;border-radius:50px;font-size:1.2em;cursor:pointer;font-weight:bold;margin:15px;background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff}
.pass-btn:disabled{opacity:0.4;cursor:not-allowed}
.result-box{background:rgba(231,76,60,0.12);border:2px solid #e74c3c;border-radius:16px;padding:20px;text-align:center;max-width:500px;width:100%;margin:10px 0}
.scores table{width:100%;border-collapse:collapse;max-width:500px}
.scores th,.scores td{padding:6px 10px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.1)}
.scores th{color:#f39c12}
.btn{padding:12px 24px;border:none;border-radius:12px;font-size:1em;cursor:pointer;font-weight:bold;margin:5px}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-back{background:rgba(255,255,255,0.15);color:#fff}
.end-buttons{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:15px}
.end-buttons button{padding:12px 24px;border:none;border-radius:12px;font-size:1em;cursor:pointer;font-weight:bold;transition:transform 0.15s}
.end-buttons button:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,0,0,0.3)}
.btn-retry{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-lobby2{background:rgba(255,255,255,0.15);color:#fff}
.wait-msg{color:rgba(255,255,255,0.5);font-size:0.9em;animation:wmPulse 1.5s infinite}
@keyframes wmPulse{0%,100%{opacity:1}50%{opacity:0.5}}
</style>
</head>
<body data-bgm="tense">
<h1>🔥 폭탄 돌리기</h1>
<div class="info">폭탄이 돌아갑니다! 미션을 완료하고 다음 사람에게 넘기세요!</div>
<div class="status" id="status">⏳ 로딩 중...</div>
<div class="bomb-area"><div class="bomb" id="bomb">💣</div></div>
<div class="holder-name">폭탄 소유자: <span id="holderName">???</span></div>
<div class="mission-box"><div style="font-size:0.8em;color:rgba(255,255,255,0.5);margin-bottom:5px">미션</div><div style="font-size:1.2em;font-weight:bold" id="mission">준비 중...</div></div>
<button class="pass-btn" id="passBtn" onclick="passBomb()" disabled>✅ 미션 완료! 넘기기</button>
<div id="resultArea" style="display:none"></div>
<div class="scores" id="scoreArea" style="display:none"><h3 style="text-align:center;margin-bottom:5px">📊 점수</h3><table><thead><tr><th>이름</th><th>점수</th></tr></thead><tbody id="scoreBody"></tbody></table></div>
<div style="margin-top:15px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
  <button class="btn btn-primary" id="btnNext" style="display:none" onclick="nextRound()">➡️ 다음</button>
  <button class="btn btn-back" id="btnBackMain" onclick="backToLobby()">🔙 로비로 돌아가기</button>
</div>
<div style="position:fixed;top:8px;left:8px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:6px 12px;border-radius:20px;font-size:0.8em;color:#fff;z-index:99999;display:flex;align-items:center;gap:6px;">
  🔊 <input type="range" min="0" max="100" value="50" style="width:70px;vertical-align:middle;" oninput="SoundEffects.setMasterVolume(this.value/100)">
  <button onclick="if(SoundEffects.bgmPlaying){if(typeof SoundEffects.stopBGM==='function')SoundEffects.stopBGM();this.textContent='🎵ON';}else{if(typeof SoundEffects.startBGM==='function')SoundEffects.startBGM(document.body.dataset.bgm||'tense');this.textContent='🎵OFF';}" style="background:none;border:1px solid rgba(255,255,255,0.3);color:#fff;padding:2px 6px;border-radius:6px;cursor:pointer;font-size:0.8em;">🎵ON/OFF</button>
</div>
<script>
// ═══ 공통 카운트다운 (전체 동기화) ═══
function triggerCountdown(subtitle,cb){
  if(!isHost)return;
  var countdownId='cd_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
  gameRef.child('countdown').set({id:countdownId,subtitle:subtitle||'게임 시작!'});
  showCountdownUI(subtitle,cb);
}
function showCountdownUI(subtitle,cb){
  var old=document.getElementById('cdOverlayNew');if(old)old.remove();
  var overlay=document.createElement('div');overlay.className='cd-overlay';overlay.id='cdOverlayNew';
  overlay.style.cssText='position:fixed;top:0;left:0;width:100vw;height:100vh;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);z-index:999999;-webkit-transform:translateZ(0);transform:translateZ(0);';
  document.body.appendChild(overlay);
  var steps=['3','2','1','GO!'],i=0;
  function tick(){
    if(i>=steps.length){setTimeout(function(){overlay.remove();if(cb)cb();},400);return;}
    var txt=steps[i];overlay.innerHTML='';
    var el=document.createElement('div');el.textContent=txt;
    if(txt==='GO!')el.style.cssText='font-size:25vw;font-weight:900;color:#2ecc71;text-shadow:0 0 30px rgba(46,204,113,0.6),0 0 60px rgba(46,204,113,0.3);animation:cdPop 0.5s ease-out;line-height:1;text-align:center;';
    else el.style.cssText='font-size:30vw;font-weight:900;color:#f1c40f;text-shadow:0 0 30px rgba(241,196,15,0.6),0 0 60px rgba(241,196,15,0.3);animation:cdPop 0.5s ease-out;line-height:1;text-align:center;';
    overlay.appendChild(el);
    if(txt!=='GO!'&&subtitle){var sub=document.createElement('div');sub.style.cssText='font-size:4vw;color:rgba(255,255,255,0.6);margin-top:10px;text-align:center;';sub.textContent=subtitle;overlay.appendChild(sub);}
    if(typeof SoundEffects!=='undefined'&&typeof SoundEffects.play==='function')SoundEffects.play(txt==='GO!'?'go':'countdown');
    i++;setTimeout(tick,800);
  }
  tick();
}
var _lastCountdownId=null;
function listenCountdown(){
  gameRef.child('countdown').on('value',function(snap){
    var cd=snap.val();if(!cd||!cd.id)return;if(isHost)return;
    if(cd.id===_lastCountdownId)return;_lastCountdownId=cd.id;
    showCountdownUI(cd.subtitle||'게임 시작!',null);
  });
}
const roomCode=Utils.getRoomCode(),playerId=Utils.getPlayerId(),playerName=Utils.getPlayerName();
const gameRef=db.ref(`rooms/${roomCode}/gameData`);
let isHost=false,currentPlayers={},checkTimer=null;
const TOTAL_ROUNDS=5;
const MISSIONS=["좋아하는 음식 3가지 말하기","최근 본 영화 제목 말하기","오늘 아침 뭐 먹었는지 말하기","좋아하는 노래 한 소절 부르기","옆 사람 칭찬 한마디 하기","3초 안에 동물 3마리 말하기","올해 가장 기억에 남는 일 말하기","좋아하는 색깔과 이유 말하기","3초 안에 나라 이름 3개 말하기","웃긴 표정 3초 유지하기","옆 사람 이름 거꾸로 말하기","가위바위보 혼자서 3번 하기"];

function getName(pid){return(currentPlayers[pid]&&currentPlayers[pid].name)||'익명';}

function renderEndButtons(container){
  let html='<div class="end-buttons">';
  if(isHost){
    html+='<button class="btn-retry" onclick="restartGame()">🔄 다시하기</button>';
    html+='<button class="btn-lobby2" onclick="goToGameSelect()">🎮 다른 게임 선택</button>';
  }else{
    html+='<p class="wait-msg">방장이 다음 게임을 준비하고 있습니다...</p>';
  }
  html+='<button class="btn-lobby2" onclick="backToLobby()">🏠 로비로</button>';
  html+='</div>';
  container.innerHTML=html;
}

async function restartGame(){if(!isHost)return;await gameRef.remove();initGame();}

async function goToGameSelect(){
  if(!isHost)return;
  if(typeof SoundEffects.stopBGM==='function')SoundEffects.stopBGM();
  Presence.setBackToLobby();Presence.destroy();gameRef.off();if(checkTimer)clearInterval(checkTimer);
  await db.ref(`rooms/${roomCode}/backToLobby`).set(Date.now());
  await new Promise(function(r){setTimeout(r,300);});
  await db.ref(`rooms/${roomCode}/currentGame`).remove();await db.ref(`rooms/${roomCode}/gameData`).remove();
  sessionStorage.setItem('returnToLobby','true');window.location.href='../index.html';
}

async function autoSkipHolder(holderId){
  if(!isHost)return;
  const snap=await gameRef.once('value');const d=snap.val();
  if(!d||d.phase!=='playing'||d.holder!==holderId)return;
  const pids=Object.keys(currentPlayers);
  const nextIdx=((d.holderIdx||0)+1)%pids.length;
  const mIdx=((d.missionIdx||0)+1)%(d.missions||MISSIONS).length;
  console.log('[HotPotato] Auto-skip from',getName(holderId),'to',getName(pids[nextIdx]));
  await gameRef.update({holder:pids[nextIdx],holderIdx:nextIdx,mission:(d.missions||MISSIONS)[mIdx]||'미션!',missionIdx:mIdx});
}

async function init(){
  const snap=await db.ref(`rooms/${roomCode}/players`).once('value');
  currentPlayers=snap.val()||{};
  const hs=await db.ref(`rooms/${roomCode}/host`).once('value');
  isHost=(hs.val()===playerId);

  Presence.init({roomCode,playerId,playerName,onAutoSkip:isHost?autoSkipHolder:null});

  gameRef.on('value',s=>{const d=s.val();if(!d){if(isHost)initGame();return;}render(d);});
  listenCountdown();
  db.ref(`rooms/${roomCode}/backToLobby`).on('value',snap=>{
    if(!snap.val())return;
    if(typeof SoundEffects.stopBGM==='function')SoundEffects.stopBGM();
    if(typeof Presence.setBackToLobby==='function')Presence.setBackToLobby();
    Presence.destroy();gameRef.off();
    sessionStorage.setItem('returnToLobby','true');
    window.location.href='../index.html';
  });
  db.ref(`rooms/${roomCode}/disbanded`).on('value',snap=>{
    if(!snap.val())return;
    if(typeof SoundEffects.stopBGM==='function')SoundEffects.stopBGM();
    Presence.destroy();gameRef.off();
    sessionStorage.removeItem('roomCode');
    sessionStorage.removeItem('returnToLobby');
    alert('방장이 방을 나갔습니다.');
    window.location.href='../index.html';
  });
  checkTimer=setInterval(async()=>{
    if(!isHost)return;
    const s=await gameRef.once('value');const d=s.val();
    if(!d||d.phase!=='playing')return;
    const elapsed=Date.now()-(d.startTime||Date.now());
    if(elapsed>=(d.bombTime||15000))explode(d);
  },500);
}

function initGame(){
  const pids=Object.keys(currentPlayers);
  const ms=[...MISSIONS].sort(()=>Math.random()-0.5);
  gameRef.set({round:1,phase:'countdown',holder:pids[0]||'',holderIdx:0,mission:ms[0]||'미션!',missions:ms,missionIdx:0,startTime:null,bombTime:Math.floor(Math.random()*10000)+8000,scores:{},explodedPlayer:null,roundId:Date.now()}).then(function(){
    triggerCountdown('폭탄 돌리기 시작!',function(){
      gameRef.update({phase:'playing',startTime:Date.now()});
    });
  });
}

function render(d){
  if(!d)return;
  const phase=d.phase||'playing',round=d.round||1,scores=d.scores||{};
  if(phase==='countdown'){
    document.getElementById('status').textContent='⏳ 준비 중...';
    document.getElementById('holderName').textContent='';
    document.getElementById('mission').textContent='';
    document.getElementById('passBtn').style.display='none';
    document.getElementById('resultArea').style.display='none';
    return;
  }
  if(phase==='final'){renderFinal(scores);return;}
  const holder=d.holder||'';
  document.getElementById('holderName').textContent=getName(holder);
  document.getElementById('mission').textContent=d.mission||'미션!';

  Presence.setCurrentHolder(holder);

  if(phase==='playing'){
    document.getElementById('status').textContent=`🔥 라운드 ${round}/${TOTAL_ROUNDS} — 폭탄이 돌아갑니다!`;
    document.getElementById('bomb').textContent='💣';document.getElementById('bomb').className='bomb';
    document.getElementById('passBtn').disabled=(holder!==playerId);
    document.getElementById('passBtn').style.display='';
    document.getElementById('resultArea').style.display='none';document.getElementById('btnNext').style.display='none';
  }else if(phase==='exploded'){
    document.getElementById('status').textContent=`💥 라운드 ${round}/${TOTAL_ROUNDS} — 폭발!`;
    document.getElementById('bomb').textContent='💥';document.getElementById('bomb').className='bomb exploded';
    document.getElementById('passBtn').style.display='none';
    Presence.setCurrentHolder(null);
    document.getElementById('resultArea').innerHTML=`<div class="result-box"><h2>💥 펑!</h2><div style="font-size:1.3em;margin:8px 0">${getName(d.explodedPlayer||'')}에게서 폭탄이 터졌습니다!</div></div>`;
    document.getElementById('resultArea').style.display='';
    if(isHost){document.getElementById('btnNext').style.display='';document.getElementById('btnNext').textContent=(round>=TOTAL_ROUNDS)?'🏆 최종결과':'➡️ 다음 라운드';}
  }
  renderScores(scores);
}

async function passBomb(){
  SoundEffects.play('click');
  const snap=await gameRef.once('value');const d=snap.val();
  if(!d||d.phase!=='playing'||d.holder!==playerId)return;
  const pids=Object.keys(currentPlayers);
  const nextIdx=((d.holderIdx||0)+1)%pids.length;
  const mIdx=((d.missionIdx||0)+1)%(d.missions||MISSIONS).length;
  await gameRef.update({holder:pids[nextIdx],holderIdx:nextIdx,mission:(d.missions||MISSIONS)[mIdx]||'미션!',missionIdx:mIdx});
}

async function explode(d){
  const holder=d.holder||'';const scores=d.scores||{};
  Object.keys(currentPlayers).forEach(p=>{if(p===holder)scores[p]=(scores[p]||0)-5;else scores[p]=(scores[p]||0)+5;});
  SoundEffects.play('explode');
  await gameRef.update({phase:'exploded',explodedPlayer:holder,scores});
}

async function nextRound(){
  if(!isHost)return;const snap=await gameRef.once('value');const d=snap.val();if(!d)return;
  const round=d.round||1;
  if(round>=TOTAL_ROUNDS){await gameRef.update({phase:'final'});return;}
  const pids=Object.keys(currentPlayers);
  const nextStart=((d.holderIdx||0)+1)%pids.length;
  const mIdx=((d.missionIdx||0)+1)%(d.missions||MISSIONS).length;
  await gameRef.update({round:round+1,phase:'playing',holder:pids[nextStart],holderIdx:nextStart,mission:(d.missions||MISSIONS)[mIdx]||'미션!',missionIdx:mIdx,startTime:Date.now(),bombTime:Math.floor(Math.random()*10000)+8000,explodedPlayer:null,roundId:Date.now()});
}

function renderScores(scores){
  if(!Object.keys(scores).length){document.getElementById('scoreArea').style.display='none';return;}
  document.getElementById('scoreArea').style.display='';
  let html='';Object.keys(currentPlayers).forEach(p=>{html+=`<tr><td>${getName(p)}</td><td>${scores[p]||0}</td></tr>`;});
  document.getElementById('scoreBody').innerHTML=html;
}

function renderFinal(scores){
  if(checkTimer)clearInterval(checkTimer);
  Presence.setCurrentHolder(null);
  Presence.setGameEnded();
  document.getElementById('status').textContent='🎉 게임 종료!';
  document.querySelector('.bomb-area').style.display='none';document.querySelector('.holder-name').style.display='none';
  document.querySelector('.mission-box').style.display='none';document.getElementById('passBtn').style.display='none';
  document.getElementById('btnNext').style.display='none';document.getElementById('btnBackMain').style.display='none';
  const sorted=Object.keys(currentPlayers).map(p=>({name:getName(p),score:scores[p]||0})).sort((a,b)=>b.score-a.score);
  let html='<div class="result-box" style="border-color:#f39c12;background:rgba(243,156,18,0.1)"><h2>🏆 최종 결과!</h2>';
  sorted.forEach((p,i)=>{const m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'▪️';html+=`<div style="font-size:1.1em;margin:4px 0">${m} ${p.name}: ${p.score}점</div>`;});
  html+='</div><div id="endBtns"></div>';
  document.getElementById('resultArea').innerHTML=html;document.getElementById('resultArea').style.display='';
  renderEndButtons(document.getElementById('endBtns'));
  SoundEffects.play('fanfare');
}

async function backToLobby(){
  if(typeof SoundEffects.stopBGM==='function')SoundEffects.stopBGM();
  Presence.setBackToLobby();
  Presence.destroy();
  gameRef.off();if(checkTimer)clearInterval(checkTimer);
  const rc=Utils.getRoomCode();if(rc){await db.ref(`rooms/${rc}/currentGame`).remove();await db.ref(`rooms/${rc}/gameData`).remove();}
  sessionStorage.setItem('returnToLobby','true');window.location.href='../index.html';
}
init();
if(typeof SoundEffects.startBGM==='function')SoundEffects.startBGM('tense');
</script>
</body>
</html>
