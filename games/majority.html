<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚖️ 다수결 살아남기</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/sound.js"></script>
<script src="../js/presence.js"></script>
<script src="../js/party-utils.js"></script>
<link rel="stylesheet" href="../css/style.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:1.6em;margin-bottom:8px}
.info{background:rgba(255,255,255,0.1);padding:10px 20px;border-radius:12px;margin-bottom:12px;text-align:center;font-size:0.9em;max-width:500px}
.status{font-size:1.1em;margin:10px 0;text-align:center}
.question{font-size:1.3em;text-align:center;margin:15px 0;font-weight:bold}
.choices{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:15px 0}
.choice-btn{padding:16px 32px;border:3px solid rgba(255,255,255,0.3);border-radius:14px;background:rgba(255,255,255,0.08);color:#fff;font-size:1.1em;cursor:pointer;transition:all 0.2s;min-width:120px}
.choice-btn:hover{background:rgba(255,255,255,0.2)}
.choice-btn.selected{border-color:#667eea;background:rgba(102,126,234,0.3)}
.choice-btn.majority{border-color:#2ecc71;background:rgba(46,204,113,0.2)}
.choice-btn.minority{border-color:#e74c3c;background:rgba(231,76,60,0.2)}
.choice-btn.draw{border-color:#f39c12;background:rgba(243,156,18,0.2)}
.choice-btn.locked{pointer-events:none;opacity:0.7}
.result-box{background:rgba(102,126,234,0.12);border:2px solid #667eea;border-radius:16px;padding:20px;text-align:center;max-width:500px;width:100%;margin:10px 0}
.players-alive{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0}
.p-chip{padding:5px 12px;border-radius:20px;font-size:0.85em;color:#fff}
.p-chip.dead{opacity:0.3;text-decoration:line-through}
.btn{padding:12px 24px;border:none;border-radius:12px;font-size:1em;cursor:pointer;font-weight:bold;margin:5px}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-back{background:rgba(255,255,255,0.15);color:#fff}
.end-buttons{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:15px}
.end-buttons button{padding:12px 24px;border:none;border-radius:12px;font-size:1em;cursor:pointer;font-weight:bold;transition:transform 0.15s}
.end-buttons button:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,0,0,0.3)}
.btn-retry{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-lobby2{background:rgba(255,255,255,0.15);color:#fff}
.wait-msg{color:rgba(255,255,255,0.5);font-size:0.9em;animation:wmPulse 1.5s infinite}
@keyframes wmPulse{0%,100%{opacity:1}50%{opacity:0.5}}
</style>
</head>
<body data-bgm="fun">
<h1>⚖️ 다수결 살아남기</h1>
<div class="info">다수가 선택한 쪽이 살아남습니다! 소수파 중 1명이 탈락! 2명이 남으면 같은 걸 골라야 둘 다 생존!</div>
<div class="status" id="status">⏳ 로딩 중...</div>
<div class="question" id="question"></div>
<div class="choices" id="choices"></div>
<div id="autoTimerArea"></div>
<div class="players-alive" id="playersAlive"></div>
<div id="resultArea" style="display:none"></div>
<div style="margin-top:15px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
  <button class="btn btn-primary" id="btnNext" style="display:none" onclick="nextRound()">➡️ 다음</button>
  <button class="btn btn-back" id="btnBackMain" onclick="backToLobby()">🔙 로비로 돌아가기</button>
</div>
<div style="position:fixed;top:8px;left:8px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:6px 12px;border-radius:20px;font-size:0.8em;color:#fff;z-index:99999;display:flex;align-items:center;gap:6px;">
  🔊 <input type="range" min="0" max="100" value="50" style="width:70px;vertical-align:middle;" oninput="SoundEffects.setMasterVolume(this.value/100)">
  <button onclick="if(SoundEffects.bgmPlaying){SoundEffects.stopBGM();this.textContent='🎵ON';}else{SoundEffects.startBGM('fun');this.textContent='🎵OFF';}" style="background:none;border:1px solid rgba(255,255,255,0.3);color:#fff;padding:2px 6px;border-radius:6px;cursor:pointer;font-size:0.8em;">🎵ON/OFF</button>
</div>
<script>
const roomCode = Utils.getRoomCode(), playerId = Utils.getPlayerId(), playerName = Utils.getPlayerName();
const gameRef = db.ref('rooms/' + roomCode + '/gameData');
let isHost = false, currentPlayers = {}, lastRenderedRound = 0;
let autoSubmitStarted = false;
const AUTO_SUBMIT_SECONDS = 30;

const QUESTIONS = [
  {q:"짜장면 vs 짬뽕?",a:["짜장면","짬뽕"]},{q:"여름 vs 겨울?",a:["여름","겨울"]},
  {q:"산 vs 바다?",a:["산","바다"]},{q:"아침형 vs 저녁형?",a:["아침형","저녁형"]},
  {q:"강아지 vs 고양이?",a:["강아지","고양이"]},{q:"소주 vs 맥주?",a:["소주","맥주"]},
  {q:"치킨 vs 피자?",a:["치킨","피자"]},{q:"드라마 vs 영화?",a:["드라마","영화"]},
  {q:"현금 vs 카드?",a:["현금","카드"]},{q:"택시 vs 지하철?",a:["택시","지하철"]},
  {q:"떡볶이 vs 순대?",a:["떡볶이","순대"]},{q:"콜라 vs 사이다?",a:["콜라","사이다"]},
  {q:"아이스 vs 핫?",a:["아이스","핫"]},{q:"삼겹살 vs 소고기?",a:["삼겹살","소고기"]},
  {q:"서울 vs 제주?",a:["서울","제주"]}
];

function getName(pid) { return (currentPlayers[pid] && currentPlayers[pid].name) || '익명'; }

async function restartGame() {
  if (!isHost) return;
  await gameRef.remove();
  initGame();
}

async function goToGameSelect() {
  if (!isHost) return;
  PartyUtils.goToGameSelect(roomCode, gameRef);
}

async function backToLobby() {
  PartyUtils.backToLobby(roomCode, gameRef);
}

async function init() {
  var snap = await db.ref('rooms/' + roomCode + '/players').once('value');
  currentPlayers = snap.val() || {};
  var hs = await db.ref('rooms/' + roomCode + '/host').once('value');
  isHost = (hs.val() === playerId);

  Presence.init({ roomCode: roomCode, playerId: playerId, playerName: playerName, onAutoSkip: null });
  PartyUtils.initReactions(roomCode, playerId);
  PartyUtils.listenCountdown(gameRef, isHost);
  PartyUtils.listenBackToLobby(roomCode, gameRef);

  PartyUtils.startCache(gameRef, function(d) {
    if (!d) { if (isHost) initGame(); return; }
    render(d);
  });
}

function initGame() {
  var alive = {};
  Object.keys(currentPlayers).forEach(function(p) { alive[p] = true; });

  gameRef.set({
    round: 1,
    phase: 'countdown',
    questions: QUESTIONS.slice().sort(function() { return Math.random() - 0.5; }),
    votes: {},
    alive: alive,
    eliminated: null,
    resultMsg: null,
    roundId: Date.now()
  }).then(function() {
    var rules = '✅ 다수가 선택한 쪽이 생존!<br>❌ 소수파 중 <b>1명만</b> 랜덤 탈락!<br>👥 2명 남으면 같은 걸 골라야 생존!';
    PartyUtils.triggerCountdown(gameRef, isHost, '다수결 게임 시작!', rules, function() {
      gameRef.update({ phase: 'choosing' });
    });
  });
}

function render(d) {
  if (!d || !d.questions) return;
  var phase = d.phase || 'choosing';
  var round = d.round || 1;
  var votes = d.votes || {};
  var alive = d.alive || {};

  if (phase === 'countdown') {
    document.getElementById('status').textContent = '⏳ 준비 중...';
    document.getElementById('question').textContent = '';
    document.getElementById('choices').innerHTML = '';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('btnNext').style.display = 'none';
    PartyUtils.clearAutoSubmitTimer('vote');
    return;
  }

  if (phase === 'final') { renderFinal(alive); return; }
  if (round > d.questions.length) { renderFinal(alive); return; }

  var q = d.questions[round - 1];
  if (!q) return;
  var aliveIds = Object.keys(alive).filter(function(p) { return alive[p]; });

  renderAlivePlayers(alive);
  document.getElementById('btnBackMain').style.display = '';

  if (phase === 'choosing') {
    var vc = Object.keys(votes).filter(function(p) { return alive[p] && votes[p]; }).length;
    document.getElementById('status').textContent = '🤔 라운드 ' + round + ' — 투표 중 (' + vc + '/' + aliveIds.length + ')';

    if (aliveIds.length === 2) {
      document.getElementById('question').innerHTML = q.q + '<div style="font-size:0.7em;color:#f39c12;margin-top:6px">⚡ 결승전! 같은 걸 골라야 둘 다 생존!</div>';
    } else {
      document.getElementById('question').textContent = q.q;
    }

    var myV = votes[playerId];
    var amAlive = alive[playerId];
    var html = '';
    q.a.forEach(function(a) {
      var cls = 'choice-btn';
      if (myV === a) cls += ' selected';
      if (!amAlive || myV) cls += ' locked';
      html += '<button class="' + cls + '" onclick="vote(\'' + a + '\')">' + a + '</button>';
    });
    document.getElementById('choices').innerHTML = html;
    document.getElementById('resultArea').style.display = 'none';

    if (amAlive && !myV && !autoSubmitStarted) {
      autoSubmitStarted = true;
      PartyUtils.startAutoSubmitTimer('vote', AUTO_SUBMIT_SECONDS, '#autoTimerArea', function() {
        var randomChoice = q.a[Math.floor(Math.random() * q.a.length)];
        gameRef.child('votes/' + playerId).once('value').then(function(s) {
          if (!s.val()) {
            gameRef.child('votes/' + playerId).set(randomChoice);
          }
        });
      });
    }
    if (myV) {
      PartyUtils.clearAutoSubmitTimer('vote');
      autoSubmitStarted = false;
    }

    if (isHost && vc >= aliveIds.length) {
      document.getElementById('btnNext').style.display = '';
      document.getElementById('btnNext').textContent = '👁️ 결과 공개';
    } else {
      document.getElementById('btnNext').style.display = 'none';
    }

  } else if (phase === 'reveal') {
    PartyUtils.clearAutoSubmitTimer('vote');
    autoSubmitStarted = false;

    document.getElementById('status').textContent = '📊 라운드 ' + round + ' — 결과!';
    document.getElementById('question').textContent = q.q;

    var counts = {};
    q.a.forEach(function(a) { counts[a] = 0; });
    Object.keys(votes).forEach(function(p) {
      if (alive[p] && votes[p]) counts[votes[p]] = (counts[votes[p]] || 0) + 1;
    });
    var maxC = Math.max.apply(null, Object.values(counts).concat([0]));

    var elim = d.eliminated || [];
    var elimSet = {};
    elim.forEach(function(p) { elimSet[p] = true; });

    var choicesHtml = '';
    q.a.forEach(function(a) {
      var cls = 'choice-btn locked';
      if (d.resultMsg && d.resultMsg.indexOf('동점') >= 0) cls += ' draw';
      else if (counts[a] >= maxC && counts[a] > 0) cls += ' majority';
      else cls += ' minority';
      choicesHtml += '<button class="' + cls + '">' + a + ' (' + counts[a] + '명)</button>';
    });
    document.getElementById('choices').innerHTML = choicesHtml;

    var rHtml = '<div class="result-box">';
    if (d.resultMsg) {
      rHtml += '<div style="font-size:1.1em;margin-bottom:8px;color:#f39c12">' + d.resultMsg + '</div>';
    }
    if (elim.length === 0) {
      rHtml += '<h3>아무도 탈락하지 않았습니다! 🎉</h3>';
    } else {
      rHtml += '<h3>💀 탈락자</h3>';
      elim.forEach(function(p) {
        rHtml += '<div style="color:#e74c3c;margin:3px 0">' + getName(p) + ' (' + (votes[p] || '미투표') + ')</div>';
      });
    }
    rHtml += '</div>';
    document.getElementById('resultArea').innerHTML = rHtml;
    document.getElementById('resultArea').style.display = '';

    var newAlive = Object.keys(alive).filter(function(p) { return alive[p]; });
    if (isHost) {
      document.getElementById('btnNext').style.display = '';
      if (newAlive.length <= 2 || round >= d.questions.length) {
        document.getElementById('btnNext').textContent = '🏆 최종결과';
      } else {
        document.getElementById('btnNext').textContent = '➡️ 다음 라운드';
      }
    } else {
      document.getElementById('btnNext').style.display = 'none';
    }
  }
}

function vote(choice) {
  gameRef.child('votes/' + playerId).once('value').then(function(s) {
    if (s.val()) return;
    SoundEffects.play('click');
    PartyUtils.vibrate(50);
    PartyUtils.clearAutoSubmitTimer('vote');
    autoSubmitStarted = false;
    gameRef.child('votes/' + playerId).set(choice);
  });
}

async function nextRound() {
  if (!isHost) return;
  var d = PartyUtils.getCached();
  if (!d) return;

  var phase = d.phase, round = d.round || 1, votes = d.votes || {}, alive = d.alive || {};

  if (phase === 'choosing') {
    var q = d.questions[round - 1];
    if (!q) return;

    var counts = {};
    q.a.forEach(function(a) { counts[a] = 0; });
    var aliveIds = Object.keys(alive).filter(function(p) { return alive[p]; });
    aliveIds.forEach(function(p) {
      if (votes[p]) counts[votes[p]] = (counts[votes[p]] || 0) + 1;
    });

    var maxC = Math.max.apply(null, Object.values(counts).concat([0]));
    var elim = [];
    var resultMsg = null;

    if (aliveIds.length === 2) {
      var v0 = votes[aliveIds[0]];
      var v1 = votes[aliveIds[1]];
      if (v0 === v1) {
        resultMsg = '🤝 같은 선택! 둘 다 생존!';
      } else {
        resultMsg = '💥 서로 다른 선택! 둘 다 탈락!';
        aliveIds.forEach(function(p) { alive[p] = false; elim.push(p); });
      }
    } else {
      var uniqueVotes = {};
      Object.values(counts).forEach(function(c) { if (c > 0) uniqueVotes[c] = true; });
      var uniqueArr = Object.keys(uniqueVotes);

      if (uniqueArr.length === 1 && parseInt(uniqueArr[0]) === aliveIds.length) {
        resultMsg = '🤷 전원 같은 선택! 무승부!';
      } else {
        var voteCounts = Object.values(counts).filter(function(c) { return c > 0; });
        var allSame = voteCounts.length > 1 && voteCounts.every(function(c) { return c === voteCounts[0]; });

        if (allSame) {
          var unlucky = aliveIds[Math.floor(Math.random() * aliveIds.length)];
          alive[unlucky] = false;
          elim.push(unlucky);
          resultMsg = '⚖️ 완전 동점! 운명의 룰렛으로 1명 탈락!';
        } else {
          var minorityPlayers = [];
          aliveIds.forEach(function(p) {
            var v = votes[p];
            if (!v || (counts[v] || 0) < maxC) {
              minorityPlayers.push(p);
            }
          });

          if (minorityPlayers.length > 0) {
            var unlucky = minorityPlayers[Math.floor(Math.random() * minorityPlayers.length)];
            alive[unlucky] = false;
            elim.push(unlucky);
            resultMsg = '소수파 ' + minorityPlayers.length + '명 중 1명 탈락!';
          }
        }
      }
    }

    SoundEffects.play(elim.length > 0 ? 'eliminate' : 'correct');
    if (elim.length > 0) {
      PartyUtils.vibrateExplode();
      PartyUtils.flashWrong();
    } else {
      PartyUtils.flashCorrect();
    }
    await gameRef.update({ phase: 'reveal', alive: alive, eliminated: elim, resultMsg: resultMsg || null });

  } else if (phase === 'reveal') {
    var aliveIds2 = Object.keys(alive).filter(function(p) { return alive[p]; });
    if (aliveIds2.length <= 2 || round >= d.questions.length) {
      await gameRef.update({ phase: 'final' });
      return;
    }
    autoSubmitStarted = false;
    await gameRef.update({
      round: round + 1,
      phase: 'choosing',
      votes: null,
      eliminated: null,
      resultMsg: null,
      roundId: Date.now()
    });
  }
}

function renderAlivePlayers(alive) {
  var html = '';
  Object.keys(currentPlayers).forEach(function(p, i) {
    var isDead = alive[p] === false;
    html += '<span class="p-chip ' + (isDead ? 'dead' : '') + '" style="background:' + Utils.getColor(i) + '">' + getName(p) + '</span>';
  });
  document.getElementById('playersAlive').innerHTML = html;
}

function renderFinal(alive) {
  PartyUtils.clearAutoSubmitTimer('vote');
  autoSubmitStarted = false;
  Presence.setGameEnded();

  document.getElementById('status').textContent = '🎉 게임 종료!';
  document.getElementById('question').textContent = '';
  document.getElementById('choices').innerHTML = '';
  document.getElementById('btnNext').style.display = 'none';
  document.getElementById('btnBackMain').style.display = 'none';

  var survivors = Object.keys(alive).filter(function(p) { return alive[p]; });

  var html = '<div class="result-box"><h2>🏆 최종 결과</h2>';
  if (survivors.length === 0) {
    html += '<div style="font-size:1.3em;margin:10px 0">전원 탈락! 😱</div>';
  } else if (survivors.length === 1) {
    html += '<div style="font-size:1.5em;margin:10px 0">🥇 ' + getName(survivors[0]) + '</div>';
    html += '<div style="color:#f1c40f;">최후의 1인!</div>';
  } else {
    html += '<div style="color:#2ecc71;margin:8px 0">🤝 공동 생존!</div>';
    survivors.forEach(function(p) {
      html += '<div style="font-size:1.2em;margin:5px 0">🎉 ' + getName(p) + '</div>';
    });
  }

  var deadPlayers = Object.keys(currentPlayers).filter(function(p) { return !alive[p]; });
  if (deadPlayers.length > 0) {
    html += '<div style="margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.1)">';
    html += '<div style="font-size:0.85em;color:rgba(255,255,255,0.4);margin-bottom:5px">💀 탈락자</div>';
    deadPlayers.forEach(function(p) {
      html += '<div style="font-size:0.9em;color:rgba(255,255,255,0.3)">' + getName(p) + '</div>';
    });
    html += '</div>';
  }
  html += '</div><div id="endBtns"></div>';

  document.getElementById('resultArea').innerHTML = html;
  document.getElementById('resultArea').style.display = '';

  PartyUtils.renderEndButtons(document.getElementById('endBtns'), isHost, {
    restart: 'restartGame()',
    gameSelect: 'goToGameSelect()',
    lobby: 'backToLobby()'
  });

  var scoreMap = {};
  survivors.forEach(function(p) { scoreMap[p] = 10; });
  PartyUtils.addPartyScore(roomCode, scoreMap).then(function() {
    PartyUtils.renderPartyScoreBoard(roomCode, currentPlayers);
  });

  SoundEffects.play('fanfare');
}

init();
if (typeof SoundEffects.startBGM === 'function') SoundEffects.startBGM('fun');
</script>
</body>
</html>
